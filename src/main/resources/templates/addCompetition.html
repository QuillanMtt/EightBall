<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Competition</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- genai throgh chatGPT was used on this page to help design the HTML and CSS aspects of the website-->
<header class="site-header">
    <div class="container nav-container">
        <div class="logo">🎱 Pool Hub</div>
    </div>
</header>

<main class="container">

    <h1>Add Competition</h1>

    <div class="card">
        <form th:action="@{/admin/saveCompetition}" method="post" th:object="${competition}">

            <label>Name:</label>
            <input type="text" th:field="*{name}">

            <label>Location:</label>
            <input type="text" th:field="*{location}">

            <label>Type:</label>
            <input type="text" th:field="*{type}">

            <label>Start Date:</label>
            <input type="text" th:field="*{startDate}">

            <label>End Date:</label>
            <input type="text" th:field="*{endDate}">

            <br><br>
            <button class="btn primary" type="submit">Save Competition</button>

        </form>
    </div>

</main>

</body>
</html>
